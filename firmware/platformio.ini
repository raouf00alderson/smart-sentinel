; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO Project Configuration — Smart Sentinel Firmware
; Documentation: https://docs.platformio.org/page/projectconf.html
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed — MUST match Serial.begin() in main.cpp
monitor_speed = 115200

; Enable thorough compiler warnings (professional practice)
build_flags =
    -Wall
    -Wextra
    -DFIRMWARE_VERSION=\"0.1.0\"